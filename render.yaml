services:
  - type: web
    name: motoroom-backend
    runtime: docker
    plan: free
    rootDir: apps/backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_AUTH_CLIENT_IDS
        sync: false
      - key: APPLE_AUTH_AUDIENCES
        value: com.erdiballikaya.motoroom
      - key: MONGODB_DATA_PATH
        value: /data/db
