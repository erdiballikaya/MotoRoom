services:
  motoroom-api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      motoroom-postgres:
        condition: service_healthy
      motoroom-mongo:
        condition: service_started
      motoroom-redis:
        condition: service_started
    environment:
      NODE_ENV: development
      PORT: 4100
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      POSTGRES_URL: postgresql://motoroom:motoroom@motoroom-postgres:5432/motoroom
      MONGODB_URI: mongodb://motoroom-mongo:27017/motoroom
      REDIS_URL: redis://motoroom-redis:6379
      JWT_ACCESS_SECRET: CHANGE_ME_ACCESS_SECRET_32_CHARS_MIN
      JWT_REFRESH_SECRET: CHANGE_ME_REFRESH_SECRET_32_CHARS_MIN
      S3_ENDPOINT: http://localhost:9000
      S3_BUCKET: motoroom-media
    ports:
      - "4100:4100"

  motoroom-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: motoroom
      POSTGRES_USER: motoroom
      POSTGRES_PASSWORD: motoroom
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motoroom -d motoroom"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - motoroom_postgres_data:/var/lib/postgresql/data

  motoroom-mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - motoroom_mongo_data:/data/db

  motoroom-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - motoroom_redis_data:/data

volumes:
  motoroom_postgres_data:
  motoroom_mongo_data:
  motoroom_redis_data:

