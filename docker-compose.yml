services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PORT: 4000
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/motoroom}
      JWT_SECRET: ${JWT_SECRET:-motoroom-dev-secret}
      GOOGLE_AUTH_CLIENT_IDS: ${GOOGLE_AUTH_CLIENT_IDS:-}
      APPLE_AUTH_AUDIENCES: ${APPLE_AUTH_AUDIENCES:-}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    restart: unless-stopped

  mongodb:
    image: mongo:7
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
